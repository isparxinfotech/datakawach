name: 🚀 CI/CD Pipeline for Angular App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v3

      - name: 🛠️ Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🧪 Run tests
        run: npm run test -- --watch=false --browsers=ChromeHeadless
        continue-on-error: true

      - name: 🏗️ Build Angular app
        run: npm run build -- --configuration production

      - name: 🚀 Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          APP_ROOT="/home/ec2-user/datakavachfrontend/datakawach"
          DIST_DIR="$APP_ROOT/dist/hrkui"
          BACKUP_DIR="/home/ec2-user/datakavachfrontend/backup"

          # 🔐 Decode and prepare SSH key
          echo "$EC2_SSH_KEY" | base64 -d > ssh_key
          chmod 600 ssh_key

          echo "📁 Creating necessary directories on EC2..."
          ssh -i ssh_key -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST '
            set -e
            mkdir -p '"$BACKUP_DIR"' &&
            mkdir -p '"$APP_ROOT"'/dist &&
            echo "✅ Directories ready."'

          echo "🗃️ Backing up old build if it exists..."
          ssh -i ssh_key -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST '
            set -e
            if [ -d '"$DIST_DIR"' ]; then
              timestamp=$(date +%s)
              mv '"$DIST_DIR"' '"$BACKUP_DIR"'/hrkui-$timestamp
              echo "✅ Backup created: hrkui-$timestamp"
            fi'

          echo "📤 Uploading new build to EC2..."
          ssh -i ssh_key -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST 'mkdir -p '"$DIST_DIR"
          scp -i ssh_key -r dist/hrkui/* $EC2_USER@$EC2_HOST:$DIST_DIR

          echo "🔁 Validating and restarting NGINX..."
          ssh -i ssh_key -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST '
            set -e
            if [ -f '"$DIST_DIR"'/index.html ]; then
              echo "✅ Build files uploaded"
              echo "🧪 Running nginx config test..."

              if ! sudo nginx -t; then
                echo "❌ nginx config validation failed"
                sudo systemctl status nginx --no-pager || true
                sudo journalctl -xeu nginx.service --no-pager -n 80 || true
                exit 1
              fi

              echo "🔄 Reloading nginx..."
              if sudo systemctl is-active --quiet nginx; then
                sudo systemctl reload nginx || sudo systemctl restart nginx
              else
                sudo systemctl start nginx
              fi

              echo "📋 nginx service status:"
              sudo systemctl status nginx --no-pager || true
              echo "✅ Deployment completed and nginx is healthy"
            else
              echo "❌ Deployment failed - index.html missing"
              exit 1
            fi'

  rollback-if-failed:
    needs: build-and-deploy
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: 🔐 Setup SSH Key
        run: |
          echo "$EC2_SSH_KEY" | base64 -d > ssh_key
          chmod 600 ssh_key
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: ♻️ Rollback to previous backup
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          set -euo pipefail
          APP_ROOT="/home/ec2-user/datakavachfrontend/datakawach"
          DIST_DIR="$APP_ROOT/dist/hrkui"
          BACKUP_DIR="/home/ec2-user/datakavachfrontend/backup"

          echo "🛑 Deploy failed, starting rollback..."
          ssh -i ssh_key -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST '
            set -e
            latest_backup=$(ls -td '"$BACKUP_DIR"'/hrkui-* 2>/dev/null | head -n1)
            if [ -n "$latest_backup" ]; then
              rm -rf '"$DIST_DIR"'
              cp -r "$latest_backup" '"$DIST_DIR"'

              echo "🧪 Re-validating nginx config before reload..."
              if ! sudo nginx -t; then
                echo "❌ nginx config is still invalid during rollback"
                sudo systemctl status nginx --no-pager || true
                sudo journalctl -xeu nginx.service --no-pager -n 80 || true
                exit 1
              fi

              if sudo systemctl is-active --quiet nginx; then
                sudo systemctl reload nginx || sudo systemctl restart nginx
              else
                sudo systemctl start nginx
              fi

              echo "✅ Rollback successful: restored from $latest_backup"
            else
              echo "❌ No backup found to rollback."
              exit 1
            fi'
